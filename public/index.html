<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows XP — AI HTML Generator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tahoma', sans-serif; font-size: 11px; overflow: hidden; height: 100vh; background: #000; }

        /* 桌面 */
        #desktop { position: fixed; top: 0; left: 0; right: 0; bottom: 40px; background: url('https://upload.wikimedia.org/wikipedia/commons/0/05/Bliss_%28Windows_XP%29.png') center/cover; z-index: 0; }
        #desktop.fallback-bg { background-image: none; background: linear-gradient(180deg, #87CEEB 0%, #87CEEB 35%, #7ec856 35%, #5da832 55%, #4a8e2a 55%, #3d7722 70%, #5a9e35 70%, #8bc34a 100%); }

        /* 任务栏 */
        #taskbar { position: fixed; bottom: 0; left: 0; right: 0; height: 40px; background: linear-gradient(180deg, #3573c9 0%, #2b5eb0 3px, #1e4d9e 3px, #2560b8 50%, #1b4a8c 50%, #1a4480 100%); z-index: 1000; display: flex; align-items: center; padding: 0 2px; }
        #start-btn { height: 34px; min-width: 100px; background: linear-gradient(180deg, #4caf4c 0%, #3d9a3d 40%, #2e7d2e 40%, #256b25 100%); color: #fff; font-weight: bold; border: none; border-radius: 0 12px 12px 0; cursor: pointer; display: flex; align-items: center; gap: 7px; padding: 0 14px; }
        #start-menu { position: fixed; bottom: 42px; left: 4px; width: 320px; background: #fff; border: 2px solid #003399; border-radius: 8px 8px 0 0; display: none; z-index: 999; }
        #start-menu.visible { display: block; animation: menuSlideUp 0.15s ease-out; }
        @keyframes menuSlideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .menu-item { display: flex; align-items: center; gap: 10px; padding: 8px 16px; cursor: pointer; }
        .menu-item:hover { background: #316ac5; color: #fff; }
        #clock { color: #fff; margin-left: auto; margin-right: 10px; font-size: 11px; }

        /* 任务栏窗口按钮区域 */
        #taskbar-windows { flex: 1; display: flex; align-items: center; gap: 4px; padding: 0 8px; overflow-x: auto; }
        .taskbar-btn { height: 28px; padding: 0 12px; background: linear-gradient(180deg, #4a7cc9 0%, #3565b0 50%, #2d5599 50%, #234780 100%); border: 1px solid #1a3d6e; border-radius: 3px; color: #fff; font-size: 11px; cursor: pointer; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; max-width: 160px; }
        .taskbar-btn.active { background: linear-gradient(180deg, #3a6bc5 0%, #2b5599 50%, #1e4480 50%, #163668 100%); border-color: #0f2440; box-shadow: inset 0 2px 3px rgba(0,0,0,0.3); }

        /* 搜索弹窗 */
        #search-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 40px; background: rgba(0,0,0,0.35); z-index: 800; display: none; align-items: flex-start; justify-content: center; padding-top: 8vh; }
        #search-overlay.visible { display: flex; }
        #search-modal { background: #fff; border: 2px solid #003399; border-radius: 8px; box-shadow: 4px 4px 20px rgba(0,0,0,0.6); width: 520px; max-width: 92vw; max-height: 75vh; display: flex; flex-direction: column; overflow: hidden; animation: windowFadeIn 0.2s ease-out; }
        @keyframes windowFadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .search-titlebar { background: linear-gradient(180deg, #0058e6 0%, #3a8cf5 40%, #2b7aee 50%, #1a60d0 100%); color: #fff; padding: 6px 10px; font-weight: bold; display: flex; justify-content: space-between; }
        .search-close { background: #d04030; border: none; color: #fff; width: 20px; height: 20px; cursor: pointer; border-radius: 2px; }
        .search-body { padding: 16px; background: #ece9d8; flex: 1; display: flex; flex-direction: column; }
        .search-input-row { display: flex; gap: 8px; }
        .search-input { flex: 1; padding: 7px 10px; border: 1px solid #7f9db9; border-radius: 3px; font-size: 13px; outline: none; }
        .search-btn { padding: 7px 18px; background: linear-gradient(180deg, #f0f0f0 0%, #d0d0d0 100%); border: 1px solid #7f9db9; cursor: pointer; }
        .results-area { flex: 1; overflow-y: auto; margin-top: 12px; background: #fff; border: 1px solid #c0c0c0; padding: 4px; display: none; }
        .results-area.visible { display: block; }
        .result-item { display: flex; gap: 10px; padding: 10px 8px; cursor: pointer; border-bottom: 1px solid #e8e8e8; }
        .result-item:hover { background: #e8f0fa; }
        .result-icon { font-size: 22px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; background: #f0f4f8; border-radius: 4px; }
        .result-title { font-weight: bold; color: #1a3d8f; text-decoration: underline; }
        .result-desc { color: #444; }
        .loading-indicator { display: none; justify-content: center; align-items: center; gap: 10px; padding: 30px; }
        .loading-indicator.visible { display: flex; }
        .loading-spinner { width: 28px; height: 28px; border: 3px solid #ccc; border-top-color: #316ac5; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 动态窗口 */
        .ai-window { position: fixed; width: 600px; height: 450px; min-width: 300px; min-height: 250px; background: #ece9d8; border: 2px solid #003399; border-radius: 8px 8px 4px 4px; box-shadow: 4px 4px 18px rgba(0,0,0,0.5); display: none; flex-direction: column; z-index: 500; resize: both; overflow: hidden; }
        .ai-window.visible { display: flex; animation: windowFadeIn 0.25s ease-out; }
        .ai-window.active { z-index: 600; }
        .win-titlebar { background: linear-gradient(180deg, #0058e6 0%, #3a8cf5 40%, #2b7aee 50%, #1a60d0 100%); color: #fff; padding: 4px 8px; display: flex; align-items: center; justify-content: space-between; font-weight: bold; cursor: move; }
        .win-controls { display: flex; gap: 2px; }
        .win-ctrl-btn { width: 20px; height: 20px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; line-height: 1; border-radius: 2px; }
        .win-ctrl-btn:hover { background: rgba(255,255,255,0.25); }
        .win-close { background: #d04030; border-color: #8b1a10; }
        .win-close:hover { background: #e05040; }
        .win-body { flex: 1; overflow: hidden; background: #fff; position: relative; }
        .win-input-bar { display: flex; padding: 6px; background: #f0ead8; border-top: 1px solid #c0b8a0; }
        .win-input-bar input { flex: 1; padding: 4px; border: 1px solid #7f9db9; }
        .win-input-bar button { margin-left: 4px; padding: 4px 12px; background: linear-gradient(180deg, #f0f0f0 0%, #d0d0d0 100%); border: 1px solid #888; cursor: pointer; }

        /* 代码预览区：黑底绿字，在输入栏下方 */
        .code-preview {
            background: #000;
            color: #0f0;
            font-family: 'Courier New', monospace;
            font-size: 10px;
            padding: 4px 8px;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 50px;
            overflow-y: auto;
            border-top: 1px solid #333;
            flex-shrink: 0;
        }

        /* HTML iframe */
        .html-iframe { width: 100%; height: 100%; border: none; }

        /* 关机 */
        #shutdown-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 2000; display: none; align-items: center; justify-content: center; }
        #shutdown-overlay.visible { display: flex; }
        #shutdown-dialog { background: #ece9d8; border: 2px solid #003399; border-radius: 8px; width: 380px; padding: 20px; text-align: center; animation: windowFadeIn 0.2s ease-out; }
        #shutdown-dialog button { margin: 4px; padding: 6px 18px; }
        #full-shutdown { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #000; z-index: 3000; display: none; align-items: center; justify-content: center; color: #ccc; flex-direction: column; cursor: pointer; }
        #full-shutdown.visible { display: flex; }
    </style>
</head>
<body>
    <div id="desktop"></div>

    <div id="taskbar">
        <button id="start-btn">🖥️ 开始</button>
        <div id="taskbar-windows"></div>
        <span id="clock"></span>
    </div>

    <div id="start-menu">
        <div class="menu-item" data-action="search">🔍 搜索</div>
        <div class="menu-item" data-action="shutdown">⏻ 关机</div>
    </div>

    <div id="search-overlay">
        <div id="search-modal">
            <div class="search-titlebar">
                <span>🔍 搜索</span>
                <button class="search-close" id="search-close">✕</button>
            </div>
            <div class="search-body">
                <div class="search-input-row">
                    <input type="text" class="search-input" id="search-input" placeholder="输入搜索内容...">
                    <button class="search-btn" id="search-submit">搜索</button>
                </div>
                <div class="loading-indicator" id="search-loading">
                    <div class="loading-spinner"></div> AI 正在生成结果...
                </div>
                <div class="results-area" id="search-results"></div>
            </div>
        </div>
    </div>

    <div id="windows-container"></div>

    <div id="shutdown-overlay">
        <div id="shutdown-dialog">
            <h3>⏻ 关闭计算机</h3>
            <p>确定要关机吗？</p>
            <button id="shutdown-ok">关机</button>
            <button id="shutdown-cancel">取消</button>
        </div>
    </div>
    <div id="full-shutdown">
        <div>Windows 正在关机...</div>
        <div style="font-size:11px;opacity:0.5;">（点击任意位置重新启动）</div>
    </div>

    <script>
        const desktop = document.getElementById('desktop');
        const startBtn = document.getElementById('start-btn');
        const startMenu = document.getElementById('start-menu');
        const clockEl = document.getElementById('clock');
        const searchOverlay = document.getElementById('search-overlay');
        const searchInput = document.getElementById('search-input');
        const searchSubmit = document.getElementById('search-submit');
        const searchClose = document.getElementById('search-close');
        const searchLoading = document.getElementById('search-loading');
        const searchResults = document.getElementById('search-results');
        const container = document.getElementById('windows-container');
        const taskbarWindows = document.getElementById('taskbar-windows');
        const shutdownOverlay = document.getElementById('shutdown-overlay');
        const shutdownOk = document.getElementById('shutdown-ok');
        const shutdownCancel = document.getElementById('shutdown-cancel');
        const fullShutdown = document.getElementById('full-shutdown');

        let startVisible = false;
        let windows = [];
        let activeId = null;
        let zCounter = 500;

        function updateClock() {
            const now = new Date();
            const h = now.getHours(), m = now.getMinutes();
            clockEl.textContent = `${h % 12 || 12}:${String(m).padStart(2, '0')} ${h >= 12 ? '下午' : '上午'}`;
        }
        updateClock(); setInterval(updateClock, 30000);

        // 开始菜单
        startBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            startVisible = !startVisible;
            startMenu.classList.toggle('visible', startVisible);
        });
        document.addEventListener('click', () => {
            if (startVisible) { startVisible = false; startMenu.classList.remove('visible'); }
        });
        document.querySelectorAll('.menu-item').forEach(item => {
            item.addEventListener('click', () => {
                startVisible = false;
                startMenu.classList.remove('visible');
                if (item.dataset.action === 'search') openSearch();
                else if (item.dataset.action === 'shutdown') openShutdown();
            });
        });

        // 搜索
        function openSearch() {
            searchOverlay.classList.add('visible');
            searchInput.value = '';
            searchResults.classList.remove('visible');
            searchLoading.classList.remove('visible');
            searchInput.focus();
        }
        function closeSearch() { searchOverlay.classList.remove('visible'); }
        searchClose.addEventListener('click', closeSearch);
        searchOverlay.addEventListener('click', (e) => { if (e.target === searchOverlay) closeSearch(); });

        async function doSearch() {
            const query = searchInput.value.trim();
            if (!query) return;
            searchResults.classList.remove('visible');
            searchLoading.classList.add('visible');
            try {
                const res = await fetch('/api/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });
                const data = await res.json();
                renderResults(data.results || []);
            } catch (err) {
                searchResults.innerHTML = '<div style="padding:20px;color:red;">搜索失败</div>';
                searchResults.classList.add('visible');
            } finally {
                searchLoading.classList.remove('visible');
            }
        }
        searchSubmit.addEventListener('click', doSearch);
        searchInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') doSearch(); });

        function renderResults(results) {
            searchResults.innerHTML = '';
            if (!results.length) {
                searchResults.innerHTML = '<div style="padding:20px;">无结果</div>';
            } else {
                results.forEach(r => {
                    const div = document.createElement('div');
                    div.className = 'result-item';
                    div.innerHTML = `
                        <div class="result-icon">${escapeHtml(r.icon || '📄')}</div>
                        <div style="flex:1;">
                            <div class="result-title">${escapeHtml(r.title)}</div>
                            <div class="result-desc">${escapeHtml(r.description || '')}</div>
                        </div>`;
                    div.addEventListener('click', () => {
                        closeSearch();
                        openHtmlWindow(r.title);
                    });
                    searchResults.appendChild(div);
                });
            }
            searchResults.classList.add('visible');
        }

        // 打开 HTML 窗口
        function openHtmlWindow(title) {
            const id = createWindow(title);
            const body = document.getElementById(`body-${id}`);
            body.innerHTML = '<div style="padding:20px;color:#888;">⏳ AI 正在生成 HTML 页面...</div>';
            const instruction = `生成一个关于“${title}”的可运行 HTML 页面，必须包含真实按钮交互（onclick等），不能只有外观。直接返回完整 HTML 代码。如果可以，尽量不要手动换行代码。`;
            requestHtmlStream(id, instruction);
        }

        function createWindow(title) {
            const id = 'win-' + Date.now();
            const z = ++zCounter;
            const win = { id, title, history: [], element: null, taskbarBtn: null, lastCode: '', isMaximized: false, prevRect: null };
            const el = document.createElement('div');
            el.className = 'ai-window visible active';
            el.id = id;
            el.style.left = (60 + windows.length * 30) + 'px';
            el.style.top = (50 + windows.length * 30) + 'px';
            el.style.zIndex = z;
            el.innerHTML = `
                <div class="win-titlebar">
                    <span>${escapeHtml(title)}</span>
                    <div class="win-controls">
                        <button class="win-ctrl-btn win-min" title="最小化">_</button>
                        <button class="win-ctrl-btn win-max" title="最大化">□</button>
                        <button class="win-ctrl-btn win-close" title="关闭">✕</button>
                    </div>
                </div>
                <div class="win-body" id="body-${id}"></div>
                <div class="win-input-bar">
                    <input type="text" placeholder="输入指令修改页面..." id="input-${id}">
                    <button id="send-${id}">发送</button>
                </div>
                <div class="code-preview" id="code-${id}"></div>`;
            container.appendChild(el);
            win.element = el;

            // 创建任务栏按钮
            const tbBtn = document.createElement('button');
            tbBtn.className = 'taskbar-btn active';
            tbBtn.textContent = title;
            tbBtn.addEventListener('click', () => {
                if (win.element.style.display === 'none') {
                    win.element.style.display = 'flex';
                    tbBtn.classList.add('active');
                    activateWindow(id);
                } else if (activeId === id && !win.isMaximized) {
                    minimizeWindow(id);
                } else {
                    activateWindow(id);
                    if (win.isMaximized) restoreWindow(id);
                }
            });
            taskbarWindows.appendChild(tbBtn);
            win.taskbarBtn = tbBtn;

            // 窗口事件
            el.querySelector('.win-close').addEventListener('click', () => closeWindow(id));
            el.querySelector('.win-min').addEventListener('click', () => minimizeWindow(id));
            el.querySelector('.win-max').addEventListener('click', () => toggleMaximize(id));
            el.addEventListener('mousedown', () => activateWindow(id));

            // 拖拽
            const titlebar = el.querySelector('.win-titlebar');
            titlebar.addEventListener('mousedown', (e) => {
                if (e.target.closest('.win-ctrl-btn')) return;
                if (win.isMaximized) return;
                const startX = e.clientX, startY = e.clientY;
                const origLeft = el.offsetLeft, origTop = el.offsetTop;
                const move = (ev) => {
                    el.style.left = (origLeft + ev.clientX - startX) + 'px';
                    el.style.top = (origTop + ev.clientY - startY) + 'px';
                };
                const up = () => { document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', up); };
                document.addEventListener('mousemove', move);
                document.addEventListener('mouseup', up);
            });

            const input = el.querySelector(`#input-${id}`);
            const sendBtn = el.querySelector(`#send-${id}`);
            sendBtn.addEventListener('click', () => {
                const instr = input.value.trim();
                if (instr) { input.value = ''; requestHtmlStream(id, instr); }
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') { sendBtn.click(); }
            });

            windows.push(win);
            activateWindow(id);
            return id;
        }

        function activateWindow(id) {
            windows.forEach(w => {
                w.element.classList.remove('active');
                w.taskbarBtn.classList.remove('active');
            });
            const win = windows.find(w => w.id === id);
            if (win) {
                win.element.classList.add('active');
                win.element.style.zIndex = ++zCounter;
                win.taskbarBtn.classList.add('active');
                activeId = id;
            }
        }

        function minimizeWindow(id) {
            const win = windows.find(w => w.id === id);
            if (!win) return;
            win.element.style.display = 'none';
            win.taskbarBtn.classList.remove('active');
            if (activeId === id) activeId = null;
        }

        function toggleMaximize(id) {
            const win = windows.find(w => w.id === id);
            if (!win) return;
            if (win.isMaximized) {
                restoreWindow(id);
            } else {
                maximizeWindow(id);
            }
        }

        function maximizeWindow(id) {
            const win = windows.find(w => w.id === id);
            if (!win) return;
            const el = win.element;
            win.prevRect = { left: el.style.left, top: el.style.top, width: el.style.width, height: el.style.height };
            el.style.left = '0';
            el.style.top = '0';
            el.style.width = '100%';
            el.style.height = 'calc(100% - 40px)';
            el.style.resize = 'none';
            win.isMaximized = true;
            el.querySelector('.win-max').textContent = '❐';
        }

        function restoreWindow(id) {
            const win = windows.find(w => w.id === id);
            if (!win || !win.prevRect) return;
            const el = win.element;
            el.style.left = win.prevRect.left;
            el.style.top = win.prevRect.top;
            el.style.width = win.prevRect.width;
            el.style.height = win.prevRect.height;
            el.style.resize = 'both';
            win.isMaximized = false;
            el.querySelector('.win-max').textContent = '□';
        }

        function closeWindow(id) {
            const win = windows.find(w => w.id === id);
            if (!win) return;
            win.element.remove();
            win.taskbarBtn.remove();
            windows = windows.filter(w => w.id !== id);
            if (activeId === id) activeId = null;
        }

        // 流式请求 HTML（带完整性检测与自动补全）
        async function requestHtmlStream(winId, instruction) {
            const win = windows.find(w => w.id === winId);
            if (!win) return;
            const body = document.getElementById(`body-${winId}`);
            const codePreview = document.getElementById(`code-${winId}`);
            body.innerHTML = '<div style="padding:20px;color:#888;">⏳ AI 正在生成 HTML 页面...</div>';
            if (codePreview) codePreview.textContent = '';

            const fetchStream = async () => {
                return await fetch('/api/generate-html-stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ instruction, history: win.history || [] })
                });
            };

            const processStream = async (response) => {
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let accumulatedCode = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6);
                            try {
                                const event = JSON.parse(data);
                                if (event.chunk) {
                                    accumulatedCode = event.chunk;
                                    if (codePreview) {
                                        const allLines = accumulatedCode.split('\n');
                                        const last3 = allLines.slice(-3).join('\n');
                                        codePreview.textContent = last3;
                                        codePreview.scrollTop = codePreview.scrollHeight;
                                    }
                                }
                                if (event.done) {
                                    const finalCode = event.fullCode || accumulatedCode;
                                    const isComplete = event.isComplete !== false;

                                    if (isComplete) {
                                        renderFinalHtml(body, finalCode, win, instruction);
                                    } else {
                                        // 不完整，自动补全
                                        body.innerHTML = '<div style="padding:20px;color:orange;">⚠️ 页面不完整，正在补全...</div>';
                                        const continuation = `请继续完成以下 HTML 代码，确保以 </html> 结束。当前代码：\n\`\`\`html\n${finalCode}\n\`\`\``;
                                        try {
                                            const res2 = await fetch('/api/generate-html-stream', {
                                                method: 'POST',
                                                headers: { 'Content-Type': 'application/json' },
                                                body: JSON.stringify({ instruction: continuation, history: [] })
                                            });
                                            await processStream(res2);
                                        } catch (e) {
                                            body.innerHTML = '<div style="padding:20px;color:red;">补全失败，请重试</div>';
                                        }
                                    }
                                    return;
                                }
                                if (event.error) {
                                    body.innerHTML = `<div style="padding:20px;color:red;">${event.error}</div>`;
                                    return;
                                }
                            } catch (e) { /* 忽略 */ }
                        }
                    }
                }
            };

            function renderFinalHtml(container, code, winObj, instr) {
                container.innerHTML = '';
                const iframe = document.createElement('iframe');
                iframe.className = 'html-iframe';
                iframe.sandbox = 'allow-scripts allow-modals allow-forms allow-popups allow-same-origin';
                iframe.srcdoc = code;
                container.appendChild(iframe);
                winObj.history = [...(winObj.history || []), { role: 'user', content: instr }, { role: 'assistant', content: code }];
            }

            try {
                const response = await fetchStream();
                await processStream(response);
            } catch (err) {
                body.innerHTML = '<div style="padding:20px;color:red;">生成失败，请重试</div>';
                console.error(err);
            }
        }

        // 关机
        function openShutdown() { shutdownOverlay.classList.add('visible'); }
        function closeShutdown() { shutdownOverlay.classList.remove('visible'); }
        shutdownCancel.addEventListener('click', closeShutdown);
        shutdownOk.addEventListener('click', () => {
            closeShutdown();
            fullShutdown.classList.add('visible');
        });
        fullShutdown.addEventListener('click', () => {
            fullShutdown.classList.remove('visible');
            updateClock();
        });

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        const bgImg = new Image();
        bgImg.onerror = () => desktop.classList.add('fallback-bg');
        bgImg.src = 'https://upload.wikimedia.org/wikipedia/commons/0/05/Bliss_%28Windows_XP%29.png';
        setTimeout(() => { if (!bgImg.complete || bgImg.naturalWidth === 0) desktop.classList.add('fallback-bg'); }, 4000);
    </script>
</body>
</html>
